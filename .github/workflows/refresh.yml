name: refresh-data

on:
  schedule:
    # каждые 3 часа в рабочее окно 09–18 МСК (МСК = UTC+3): 06,09,12,15 UTC = 09,12,15,18 МСК
    - cron: '0 6,9,12,15 * * *'
  workflow_dispatch:           # и вручную из вкладки Actions
  push:                        # и при пуше кода (кроме коммитов с данными — чтобы не зациклить)
    paths-ignore:
      - 'data.json'
      - 'enroll_1_8.json'

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, dom, mbstring

      - name: Collect ratings
        run: php collect.php

      - name: Commit if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json enroll_1_8.json
          if git diff --cached --quiet; then
            echo "Нет изменений в данных"
          else
            git commit -m "refresh data ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
